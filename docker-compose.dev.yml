version: "3.9"

# Development overrides — hot-reload for both services
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      DEBUG: "true"

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./frontend:/app
      - /app/node_modules       # anonymous volume keeps container node_modules
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ""
      NEXT_PUBLIC_USE_API_REWRITE: "1"
      BACKEND_INTERNAL_URL: http://backend:8000
      NEXT_PUBLIC_APP_ENV: development

  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"
