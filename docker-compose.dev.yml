# Development overrides — hot-reload for both services
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      DEBUG: "true"

  frontend:
    image: node:20-alpine
    working_dir: /app
    # Bind-mount from Windows breaks webpack pack rename + .next/dev; keep .next on Linux volume.
    user: "0:0"
    # NODE_ENV=development: next dev + PostCSS; npm ci: стабильный node_modules (иначе бывают react-dom / CSS без postcss).
    command: sh -c "npm ci --include=dev && npm run dev"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NPM_CONFIG_PRODUCTION: "false"
      NEXT_PUBLIC_API_URL: ""
      NEXT_PUBLIC_USE_API_REWRITE: "1"
      BACKEND_INTERNAL_URL: http://backend:8000
      NEXT_PUBLIC_APP_ENV: development

  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

volumes:
  frontend_next:
  frontend_node_modules:
